<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="hex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <g filter="url(#glow)">
    <polygon points="512,160 832,340 832,684 512,864 192,684 192,340"
             fill="none" stroke="url(#hex)" stroke-width="36" stroke-linejoin="round"/>
  </g>
  <text x="512" y="620" text-anchor="middle"
        font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial"
        font-size="340" font-weight="900" fill="url(#hex)" letter-spacing="-12">A</text>
  <circle cx="760" cy="260" r="54" fill="#10b981"/>
</svg>

name: A.L.E.C. Health Check

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours (not every 15 min — saves Actions minutes)
  workflow_dispatch:

jobs:
  health-check:
    name: Ping A.L.E.C.
    runs-on: ubuntu-latest
    steps:
      - name: Check A.L.E.C. via Tailscale Funnel
        id: health
        run: |
          HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" \
            "https://macbook-pro.tail97cec9.ts.net/" \
            --max-time 15 || echo "000")

          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" = "200" ]; then
            echo "A.L.E.C. is UP (HTTP $HTTP_CODE)"
          else
            echo "A.L.E.C. is DOWN (HTTP $HTTP_CODE)"
          fi

      - name: Alert if down
        if: steps.health.outputs.http_code != '200'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.ALERT_GMAIL_USER }}
          password: ${{ secrets.ALERT_GMAIL_APP_PASSWORD }}
          subject: "A.L.E.C. is DOWN — HTTP ${{ steps.health.outputs.http_code }}"
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: "A.L.E.C. Health <${{ secrets.ALERT_GMAIL_USER }}>"
          body: |
            A.L.E.C. health check FAILED.

            Status: HTTP ${{ steps.health.outputs.http_code }}
            URL: https://macbook-pro.tail97cec9.ts.net/
            Time: ${{ github.event.schedule || 'manual' }}

            Possible causes:
            - Mac is off or sleeping
            - Node.js server crashed
            - Tailscale Funnel not running

            Fix:
            cd ~/Desktop/App\ Development/A.l.E.C
            bash scripts/start-alec.sh
            tailscale funnel --bg 3001
          content_type: text/plain

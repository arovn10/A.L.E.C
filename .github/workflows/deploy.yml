name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'api/**'
      - 'vercel.json'

jobs:
  deploy:
    name: Deploy A.L.E.C. to Vercel
    runs-on: ubuntu-latest
    # Only deploy if VERCEL_TOKEN is set
    if: ${{ secrets.VERCEL_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set, skipping deploy"
            exit 0
          fi

          # If org/project IDs are set, use them
          if [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            mkdir -p .vercel
            echo "{\"orgId\":\"$VERCEL_ORG_ID\",\"projectId\":\"$VERCEL_PROJECT_ID\"}" > .vercel/project.json
            vercel pull --yes --environment=production --token=$VERCEL_TOKEN
            vercel build --prod --token=$VERCEL_TOKEN
            vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
          else
            # Direct deploy without project linking
            vercel deploy --prod --yes --token=$VERCEL_TOKEN
          fi

      - name: Deploy status
        if: always()
        run: |
          echo "Deploy completed. Check https://a-l-e-c.vercel.app"

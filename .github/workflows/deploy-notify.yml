name: Deploy Notification

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Tailscale IP (placeholder)
        id: tailscale
        run: echo "tailscale_ip=100.x.x.x" >> "$GITHUB_OUTPUT"

      - name: Send Telegram Notification
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TAILSCALE_IP: ${{ steps.tailscale.outputs.tailscale_ip }}
        run: |
          MSG="A.L.E.C. deployed. Access: http://${TAILSCALE_IP}:3001"
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MSG}"

      - name: Send Email Notification
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "A.L.E.C. Deployment Complete"
          body: "A.L.E.C. deployed. Tailscale: ${{ steps.tailscale.outputs.tailscale_ip }}:3001"

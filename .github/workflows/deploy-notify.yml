# A.L.E.C. - Deployment Notification Workflow
name: Deploy Notification

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  notify-deployment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Deploy to Render
        env:
          RENDER_API_TOKEN: ${{ secrets.RENDER_API_TOKEN }}
          SERVICE_ID: ${{ secrets.SERVICE_ID }}
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${RENDER_API_TOKEN}" \
            https://api.render.com/v1/services/${SERVICE_ID}/deploys

      - name: Send notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          curl -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="🚀 A.L.E.C. deployment complete! Check https://github.com/arovn10/A.L.E.C/actions"

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚀 A.L.E.C. Deployment Complete!"
          body: |
            A.L.E.C. has been successfully deployed!

            View deployment: https://github.com/arovn10/A.L.E.C/actions

